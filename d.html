<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>知恩不死 · 사진 저장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  @font-face{ font-family:"MomsTypewriter"; src:url("assets/moms-typewriter.ttf") format("truetype"); font-display:swap; }
  :root{--bg:#f3f2ee; --fg:#1f1b18; --dim:#6f675e; --line:#2b2b2b; --accent:#ececec; --primary:#9d111a}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; min-height:100vh; background-color:var(--bg); background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27200%27%20height%3D%27200%27%3E%3Cfilter%20id%3D%27g%27%3E%3CfeTurbulence%20type%3D%27fractalNoise%27%20baseFrequency%3D%270.9%27%20numOctaves%3D%272%27%20stitchTiles%3D%27stitch%27%2F%3E%3CfeColorMatrix%20type%3D%27matrix%27%20values%3D%270%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200.09%200.09%200.09%200%200%27%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D%27100%25%27%20height%3D%27100%25%27%20filter%3D%27url%28%23g%29%27%2F%3E%3C%2Fsvg%3E"),url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27240%27%20height%3D%27240%27%3E%3Cfilter%20id%3D%27f%27%3E%3CfeTurbulence%20type%3D%27fractalNoise%27%20baseFrequency%3D%270.016%200.5%27%20numOctaves%3D%272%27%20stitchTiles%3D%27stitch%27%2F%3E%3CfeColorMatrix%20type%3D%27matrix%27%20values%3D%270%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200.06%200.06%200.06%200%200%27%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D%27100%25%27%20height%3D%27100%25%27%20filter%3D%27url%28%23f%29%27%2F%3E%3C%2Fsvg%3E"); background-repeat:repeat,repeat; color:var(--fg);
    font-family:"MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif;
    display:flex; flex-direction:column; align-items:center; gap:18px; padding:28px 20px 40px;
    padding-bottom:calc(40px + env(safe-area-inset-bottom))}
  .dwrap{display:flex; gap:32px; align-items:flex-start; justify-content:center; width:100%; max-width:822px; margin:0 auto}
  .dbrand{flex:0 0 auto; padding-top:2px}
  .dbrand img{height:auto; width:auto; max-height:72vh; max-width:200px}
  .dmain{flex:1 1 auto; min-width:0; max-width:440px; display:flex; flex-direction:column; align-items:center; gap:16px}
  @media(max-width:640px){ .dwrap{flex-direction:column; align-items:center; gap:14px} .dbrand img{max-height:130px; max-width:110px} }
  #photo{max-width:100%; max-height:64vh; border:1px solid var(--line); background:var(--accent); display:none}
  .btn{width:100%; max-width:420px; padding:18px; border:none; border-radius:0; font-size:17px; font-weight:600;
    font-family:inherit; cursor:pointer; letter-spacing:.02em}
  .btn-go{background:var(--primary); color:#fff}
  a.btn{text-align:center; text-decoration:none; display:block}
  .btn:focus-visible{outline:none; box-shadow:0 0 0 3px rgba(0,0,0,.12)}
  .hint{font-size:12px; color:var(--dim); text-align:center; line-height:1.7; max-width:420px}
  .err{color:var(--dim); font-size:14px; text-align:center; line-height:1.7; padding:40px}
</style>
</head>
<body>
  <div class="dwrap">
    <aside class="dbrand"><img src="assets/hanja.png" alt="知恩不死" /></aside>
    <div class="dmain">
      <img id="photo" alt="촬영한 사진" />
      <button class="btn btn-go" id="save" style="display:none">SAVE</button>
      <div class="hint" id="hint" style="display:none">아이폰은 위 사진을 길게 눌러 '사진에 추가'로도 저장돼요.</div>
      <div class="err" id="err" style="display:none">이미지 주소가 없어요. QR을 다시 스캔해 주세요.</div>
    </div>
  </div>
<script>
const img=new URLSearchParams(location.search).get('img');
const $=id=>document.getElementById(id);
if(!img){ $('err').style.display='block'; }
else{
  const photo=$('photo'), btn=$('save');
  photo.src=img; photo.style.display='block'; btn.style.display='block'; $('hint').style.display='block';
  const dl=img.replace('/upload/','/upload/fl_attachment/'); // Cloudinary 강제 다운로드 폴백
  btn.onclick=async()=>{
    const label=btn.textContent; btn.textContent='저장 중…';
    try{
      const r=await fetch(img); if(!r.ok) throw 0;
      const b=await r.blob();
      const a=document.createElement('a'); a.href=URL.createObjectURL(b);
      a.download='jieunbulsa-'+Date.now()+'.png'; document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href); btn.textContent=label;
    }catch(e){ location.href=dl; } // fetch 실패 시 attachment 링크로
  };
}
</script>
</body>
</html>
