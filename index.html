<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>知恩不死</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  @font-face{ font-family:"MomsTypewriter"; src:url("assets/moms-typewriter.ttf") format("truetype"); font-display:swap; }
  :root{
    --bg:#f7f4ee; --card:#fdfcf9; --fg:#1f1b18; --dim:#6f675e;
    --line:#2b2b2b; --accent:#ececec; --primary:#9d111a;
    --r-xl:0px; --r-lg:0px; --r-md:0px; --r-sm:0px;
    --dur:200ms; --ease:cubic-bezier(0.22,1,0.36,1);
    --shadow:none;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; background-color:var(--bg); background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27220%27%20height%3D%27220%27%3E%3Cfilter%20id%3D%27p%27%3E%3CfeTurbulence%20type%3D%27fractalNoise%27%20baseFrequency%3D%270.9%27%20numOctaves%3D%272%27%20stitchTiles%3D%27stitch%27%2F%3E%3CfeColorMatrix%20type%3D%27matrix%27%20values%3D%270%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200.05%200.05%200.05%200%200%27%2F%3E%3C%2Ffilter%3E%3Crect%20width%3D%27100%25%27%20height%3D%27100%25%27%20filter%3D%27url%28%23p%29%27%2F%3E%3C%2Fsvg%3E"); color:var(--fg);
    font-family:"MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif;
    -webkit-user-select:none; user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .screen{min-height:100%; display:none; flex-direction:column; align-items:center;
    justify-content:flex-start; gap:18px; padding:32px 24px 40px; overflow-y:auto}
  .screen.on{display:flex}

  header{text-align:center}
  .mark{font-size:40px; letter-spacing:0; font-weight:800; color:var(--fg)}
  .brandmini{height:110px; width:auto; display:block; margin:0 auto 2px}
  .tag{font-size:13px; color:var(--dim); margin-top:8px}

  .panel{width:100%; max-width:560px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--r-xl); box-shadow:var(--shadow); padding:20px; display:flex; flex-direction:column}

  .stage{position:relative; width:100%; aspect-ratio:3/2; border-radius:var(--r-lg); overflow:hidden;
    background:#000; border:1px solid var(--line)}
  video{width:100%; height:100%; object-fit:cover; transform:scaleX(-1)}
  .count{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:140px; font-weight:700; color:#fff; text-shadow:0 4px 40px rgba(0,0,0,.7);
    background:rgba(0,0,0,.2); pointer-events:none}
  .progress{position:absolute; top:14px; left:14px; font-size:14px; letter-spacing:.25em;
    color:#fff; background:rgba(0,0,0,.55); padding:6px 13px; display:none}
  .flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none}
  .flash.on{animation:flash 340ms var(--ease)}
  @keyframes flash{0%{opacity:.95}100%{opacity:0}}

  .lab{font-size:12px; letter-spacing:.02em; color:var(--dim); margin:22px 0 11px; font-weight:500}
  .row{display:flex; gap:9px; flex-wrap:wrap}
  .chip{flex:1 1 0; min-width:80px; background:var(--accent); border:1px solid var(--line); color:var(--dim);
    border-radius:var(--r-md); padding:14px 8px; font-size:15px; cursor:pointer; text-align:center; font-weight:500;
    transition:color var(--dur) var(--ease), background var(--dur) var(--ease), border-color var(--dur) var(--ease)}
  .chip[aria-pressed="true"]{color:#fff; background:var(--primary); border-color:var(--primary)}
  #frames{flex-direction:column; gap:8px}
  #frames .chip{flex:0 0 auto; width:100%; text-align:left; padding:14px 15px; font-size:14px; line-height:1.4}

  input[type=text]{width:100%; padding:15px; background:var(--card); border:1px solid var(--line);
    color:var(--fg); border-radius:var(--r-sm); font-size:16px; font-family:inherit; margin-top:22px; text-align:center}
  input::placeholder{color:#9a9a93}

  .btn{width:100%; max-width:560px; padding:18px; border:none; border-radius:var(--r-md); font-size:17px; font-weight:600;
    font-family:inherit; cursor:pointer; letter-spacing:.02em; transition:opacity var(--dur) var(--ease)}
  .btn-go{background:var(--primary); color:#fff}
  .btn-go.full{margin-top:18px}
  .btn-ghost{background:var(--card); color:var(--fg); border:1px solid var(--line); margin-top:10px}
  .btn:disabled{opacity:.45}
  .chip:focus-visible,.btn:focus-visible,input:focus-visible{outline:none; box-shadow:0 0 0 3px rgba(0,0,0,.12)}

  .preview-wrap{display:flex; justify-content:center; margin-top:4px}
  #preview{height:300px; max-width:100%; border:1px solid var(--line); background:var(--accent)}

  .qrbox{display:flex; flex-direction:column; align-items:center; gap:8px; min-height:26px}
  #qrimg{width:150px; height:150px; border:1px solid var(--line); background:#fff; display:none}
  .qrcap{font-size:13px; color:var(--dim); text-align:center}

  .capwrap{display:flex; gap:28px; align-items:flex-start; justify-content:center; width:100%; max-width:920px; margin:0 auto}
  .brand{flex:0 0 auto; display:flex; justify-content:center; padding-top:4px}
  .brand img{height:auto; width:auto; max-height:80vh; max-width:230px}
  .capmain{flex:1 1 auto; min-width:0; max-width:560px; display:flex; flex-direction:column}
  @media(max-width:700px){
    .capwrap{flex-direction:column; align-items:center; gap:14px}
    .brand img{max-height:150px; max-width:120px}
  }

  .result-body{flex:1; display:flex; align-items:center; justify-content:center; padding:4px 0; width:100%}
  #strip{max-width:100%; max-height:60vh; border:1px solid var(--line)}
  .err{color:var(--dim); font-size:14px; text-align:center; line-height:1.7; padding:30px}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important; transition:none!important}}
</style>
</head>
<body>

<section class="screen on" id="capScreen">
  <div class="capwrap">
    <aside class="brand"><img src="assets/hanja.png" alt="知恩不死" /></aside>
    <div class="capmain">
      <div class="panel">
        <div class="stage">
          <video id="cam" autoplay playsinline muted></video>
          <div class="flash" id="flash"></div>
          <div class="progress" id="prog"></div>
          <div class="count" id="count" style="display:none"></div>
        </div>
        <div class="err" id="err" style="display:none"></div>

        <p class="lab">필터</p>
        <div class="row" id="filters"></div>
        <p class="lab">프레임</p>
        <div class="row" id="frames"></div>

        <p class="lab">문구</p>
        <div class="row" id="phrases"></div>

        <p class="lab">미리보기</p>
        <div class="preview-wrap"><canvas id="preview"></canvas></div>
      </div>
      <button class="btn btn-go full" id="shoot">START</button>
    </div>
  </div>
</section>

<section class="screen" id="resScreen">
  <div class="capwrap">
    <aside class="brand"><img src="assets/hanja.png" alt="知恩不死" /></aside>
    <div class="capmain">
      <div class="result-body"><canvas id="strip"></canvas></div>
      <div class="qrbox" id="qrbox"><img id="qrimg" alt="다운로드 QR"><div class="qrcap" id="qrcap"></div></div>
      <button class="btn btn-go full" id="download">SAVE</button>
      <button class="btn btn-ghost" id="retake">다시 찍기</button>
    </div>
  </div>
</section>

<script>
// ── QR 다운로드 설정 (Cloudinary 무료, 무서명 업로드) ──────────────
// 1) cloudinary.com 가입 → Dashboard의 "Cloud name" 복사
// 2) Settings > Upload > Upload presets > Add → Signing Mode: Unsigned, 저장 후 preset 이름 복사
// 3) 아래 두 값 채우기. 비워두면 QR 대신 안내만 뜨고, SAVE(로컬 저장)는 항상 동작.
const CLOUD_NAME='disdmlod';   // Cloudinary Cloud name
const UPLOAD_PRESET='jebs-pb'; // Unsigned upload preset

const FILTERS=[
  {id:'original', name:'오리지널', css:'none'},
  {id:'mono',     name:'흑백',     css:'grayscale(1) contrast(1.08)'},
  {id:'haduri',   name:'하두리',   css:'brightness(1.35) contrast(0.8) saturate(1.12) blur(0.5px)', lo:0.42},
];
const FRAMES=[
  {id:'jieunL', name:'귀여운 한 컷을 찍고 싶다면', bg:'#fff', txt:'#222', edition:true, art:'line'},
  {id:'red',   name:'온 마음을 담아 지은불사를 외치고 싶다면', overlay:'frame1'},
  {id:'psy',   name:'지은이의 유일한 옷, 이레즈미 셔츠가 탐난다면', overlay:'frame3'},
  {id:'cyan',  name:"[초특급에디션] '다들힘내'를 거꾸로 말하면", overlay:'frame2', windows:[
    {x:.0565,y:.0197,w:.8869,h:.2171},{x:.0565,y:.2511,w:.8869,h:.2171},
    {x:.0565,y:.4825,w:.8869,h:.2171},{x:.0565,y:.7138,w:.6161,h:.2182}]},
];
// 오버레이 프레임(투명 창 PNG) — 사진을 창에 깔고 위에 프레임을 덮음
const OVERLAYS={frame1:new Image(), frame2:new Image(), frame3:new Image()};
OVERLAYS.frame1.src='assets/frame1.png'; OVERLAYS.frame2.src='assets/frame2.png'; OVERLAYS.frame3.src='assets/frame3.png';
const GRID=[{x:.0565,y:.0197,w:.8869,h:.2182},{x:.0565,y:.2511,w:.8869,h:.2182},
            {x:.0565,y:.4825,w:.8869,h:.2182},{x:.0565,y:.7138,w:.8869,h:.2182}];
const mascot=new Image(); mascot.src='assets/jieun.png';
const mascotLine=new Image(); mascotLine.src='assets/jieun_line.png';
const PHRASES=['지은아 사랑해','지은아 힘내','지은이 최고야'];
const SHOTS=4, PW=400, PH=267, PAD=24, GAP=14, FOOT=82, DPR=3;
const CHARS=['知','恩','不','死']; // one per cut, white overlay on 화이트/블랙 frames
let filter=FILTERS[0], frame=FRAMES[0], phrase=PHRASES[0], shots=[];

const $=id=>document.getElementById(id);
const video=$('cam'), flash=$('flash'), count=$('count'), prog=$('prog');

function chips(host, list, render, onPick){
  list.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='chip'; b.setAttribute('aria-pressed', i===0); b.innerHTML=render(t);
    b.onclick=()=>{ onPick(t); [...host.children].forEach((c,j)=>c.setAttribute('aria-pressed', j===i)); };
    host.appendChild(b);
  });
}
chips($('filters'), FILTERS, t=>t.name, t=>{filter=t; video.style.filter=t.css; updatePreview();});
chips($('frames'), FRAMES, t=>t.name, t=>{frame=t; updatePreview();});
chips($('phrases'), PHRASES, t=>t, t=>{phrase=t; updatePreview();});

(async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=stream;
  }catch(e){
    $('err').style.display='block'; $('err').innerHTML='카메라 권한이 필요해요.<br>iPad 설정 > Safari > 카메라에서 허용해 주세요.';
    $('shoot').disabled=true;
  }
})();

const wait=ms=>new Promise(r=>setTimeout(r,ms));

function drawCover(ctx,dw,dh){
  const vw=video.videoWidth, vh=video.videoHeight;
  const s=Math.max(dw/vw,dh/vh), sw=dw/s, sh=dh/s, sx=(vw-sw)/2, sy=(vh-sh)/2;
  ctx.save(); ctx.translate(dw,0); ctx.scale(-1,1);
  ctx.imageSmoothingQuality='high';
  ctx.filter=filter.css==='none'?'none':filter.css;
  ctx.drawImage(video, sx,sy,sw,sh, 0,0,dw,dh); ctx.restore();
}
function snap(){
  const lr=filter.lo||1; // full-res normally; only 하두리 captures lo-fi for retro look
  const cw=Math.round(PW*DPR*lr), ch=Math.round(PH*DPR*lr);
  const c=document.createElement('canvas'); c.width=cw; c.height=ch;
  drawCover(c.getContext('2d'), cw, ch); return c;
}

let busy=false;
function updatePreview(){
  if(busy || !video.videoWidth) return;
  const s=snap();
  compose($('preview'), Array(SHOTS).fill(s));
}

async function shoot(){
  busy=true;
  $('shoot').disabled=true; shots=[]; prog.style.display='block';
  for(let i=0;i<SHOTS;i++){
    prog.textContent=`${i+1} / ${SHOTS}`; count.style.display='flex';
    for(let n=3;n>0;n--){ count.textContent=n; await wait(800); }
    count.textContent='●'; await wait(150);
    flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
    shots.push(snap()); count.style.display='none'; await wait(550);
  }
  prog.style.display='none'; $('shoot').disabled=false; busy=false;
  compose(); show('resScreen'); makeQR();
}

async function makeQR(){
  const img=$('qrimg'), cap=$('qrcap');
  img.style.display='none';
  if(!CLOUD_NAME || !UPLOAD_PRESET){ cap.textContent='QR: Cloudinary 설정 후 사용 가능 (SAVE는 지금도 됨)'; return; }
  cap.textContent='업로드 중…';
  try{
    const blob=await new Promise(r=>$('strip').toBlob(r,'image/png'));
    const fd=new FormData(); fd.append('file',blob); fd.append('upload_preset',UPLOAD_PRESET);
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
    if(!res.ok) throw new Error(res.status);
    const url=(await res.json()).secure_url;
    const base=location.href.replace(/[^/]*(\?.*)?$/,''); // 현재 폴더 URL
    const page=base+'d.html?img='+encodeURIComponent(url);
    img.src=`https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=${encodeURIComponent(page)}`;
    img.style.display='block'; cap.textContent='QR을 스캔하면 저장 페이지가 열려요';
  }catch(e){ cap.textContent='업로드 실패 · 아래 SAVE로 저장하세요'; }
}

function letterSpace(s,n){ return s.split('').join(' '.repeat(n)); }

function coverDraw(ctx,src,dx,dy,dw,dh){
  const s=Math.max(dw/src.width,dh/src.height), cw=dw/s, ch=dh/s;
  ctx.drawImage(src,(src.width-cw)/2,(src.height-ch)/2,cw,ch, dx,dy,dw,dh);
}
function stampCaption(x, W, H){
  const cap=phrase||'知恩不死';
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.$/,'');
  const capF=`700 ${Math.round(W*0.030)}px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif`;
  const dateF=`400 ${Math.round(W*0.021)}px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif`;
  const cx=W/2;
  x.save();
  x.textAlign='center'; x.textBaseline='alphabetic';
  x.shadowColor='rgba(0,0,0,.6)'; x.shadowBlur=Math.round(W*0.008);
  if('letterSpacing' in x) x.letterSpacing='-0.04em'; // 한글 자간 좁힘
  x.fillStyle='#fff'; x.font=capF; x.fillText(cap, cx, H*0.958);
  if('letterSpacing' in x) x.letterSpacing='0px';
  x.globalAlpha=.9; x.font=dateF; x.fillText(date, cx, H*0.984);
  x.restore();
}
function composeOverlay(cv, list){
  const ov=OVERLAYS[frame.overlay];
  if(!ov.complete||!ov.naturalWidth){ cv.width=2; cv.height=5; return; } // 아직 로딩 중
  const W=ov.naturalWidth, H=ov.naturalHeight;
  cv.width=W; cv.height=H;
  const x=cv.getContext('2d'); x.imageSmoothingQuality='high';
  x.fillStyle='#000'; x.fillRect(0,0,W,H);
  (frame.windows||GRID).forEach((r,i)=>{ const s=list[i]; if(s) coverDraw(x,s,r.x*W,r.y*H,r.w*W,r.h*H); });
  x.drawImage(ov,0,0,W,H);
  stampCaption(x, W, H);
}

function compose(cv=$('strip'), list=shots){
  if(frame.overlay) return composeOverlay(cv, list);
  const foot=frame.edition?174:FOOT;
  const W=PW+PAD*2, H=PAD+SHOTS*PH+(SHOTS-1)*GAP+foot;
  cv.width=W*DPR; cv.height=H*DPR;
  const x=cv.getContext('2d'); x.scale(DPR,DPR);
  x.fillStyle=frame.bg; x.fillRect(0,0,W,H);
  if(frame.dot){ x.fillStyle=frame.dot; for(let py=10;py<H;py+=22) for(let px=10+((py/22|0)%2?11:0);px<W;px+=22){ x.beginPath(); x.arc(px,py,1.6,0,7); x.fill(); } }
  list.forEach((s,i)=>x.drawImage(s, PAD, PAD+i*(PH+GAP), PW,PH));
  const baseY=PAD+SHOTS*PH+(SHOTS-1)*GAP;
  const date=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.$/,'');
  x.fillStyle=frame.txt; x.textAlign='center';
  if(frame.edition){
    const img=frame.art==='line'?mascotLine:mascot;
    if(img.complete && img.naturalWidth){
      const mh=185, mw=mh*img.naturalWidth/img.naturalHeight;
      x.drawImage(img, (W-mw)/2, baseY-62, mw, mh); // overlaps last photo by ~62px
    }
    const cap=phrase||'知恩不死';
    x.font='700 17px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif'; x.fillText(letterSpace(cap,1), W/2, baseY+142);
    x.globalAlpha=.55; x.font='400 12px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif'; x.fillText(letterSpace(date,1), W/2, baseY+163); x.globalAlpha=1;
  }else{
    const sz=Math.round(PH*0.98);
    for(let i=0;i<SHOTS;i++){
      const cy=PAD+i*(PH+GAP)+PH/2;
      x.save(); x.fillStyle=frame.char||'#fff'; x.textAlign='left'; x.textBaseline='middle';
      x.shadowColor='rgba(0,0,0,.35)'; x.shadowBlur=6;
      x.font=`700 ${sz}px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif`;
      x.fillText(CHARS[i]||'', PAD+2, cy);
      x.restore();
    }
    const cap=phrase||'知恩不死';
    x.font='600 17px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif'; x.fillText(letterSpace(cap,1), W/2, baseY+36);
    x.globalAlpha=.6; x.font='400 12px "MomsTypewriter", "궁서", Gungsuh, GungsuhChe, "Nanum Myeongjo", serif'; x.fillText(letterSpace(date,1), W/2, baseY+58); x.globalAlpha=1;
  }
}

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('on', s.id===id)); window.scrollTo(0,0); }

$('shoot').onclick=shoot;
$('retake').onclick=()=>show('capScreen');
setInterval(()=>{ if($('capScreen').classList.contains('on')) updatePreview(); }, 450);
// 웹폰트(궁서 대체) 로드되면 캔버스 다시 그림
if(document.fonts){ document.fonts.load('16px "MomsTypewriter"'); document.fonts.ready.then(()=>{ if($('capScreen').classList.contains('on')) updatePreview(); }); }
$('download').onclick=()=>{
  $('strip').toBlob(b=>{
    const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='jieunbulsa-'+Date.now()+'.png'; a.click(); URL.revokeObjectURL(a.href);
  },'image/png');
};
</script>
</body>
</html>
